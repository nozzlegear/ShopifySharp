name: Regenerate GraphQL Types
run-name: Regenerate GraphQL types for schema version ${{ inputs.schema_version }}

on:
  workflow_dispatch:
    inputs:
      schema_version:
        description: 'Shopify API version (e.g., 2026-01)'
        required: true
        type: string

permissions: {}

jobs:
  generate-types:
    runs-on: ubuntu-latest
    environment: "Unit test environment"
    permissions:
      contents: write
      pull-requests: write

    env:
      SCHEMA_VERSION: ${{ github.event.inputs.schema_version }}
      SCHEMA_JSON_FILE: "graphql-schemas/${{ github.event.inputs.schema_version }}.schema.json"
      SCHEMA_GRAPHQL_FILE: "graphql-schemas/${{ github.event.inputs.schema_version }}.schema.graphql"
      DEFAULT_SCHEMA_FILE: "graphql.schema.json"

    steps:
    - name: Checkout code
      # zizmor: ignore[artipacked] -- credentials intentionally persisted for `git push` in create-graphql-pr; no artifact uploads in this workflow.
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Setup .NET
      uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
      with:
        dotnet-version: |
          10.0.x

    - name: Setup justfile
      uses: taiki-e/install-action@f176c07a0a40cbfdd08ee9aa8bf1655701d11e69 # v2.67.25
      with:
        tool: just@1.46.0

    - name: Restore dependencies
      run: dotnet restore

    - name: Download GraphQL schema
      run: just download-graphql-schema --api-version "$SCHEMA_VERSION" --domain "${{ secrets.SHOPIFYSHARP_MY_SHOPIFY_URL }}" --token "${{ secrets.SHOPIFYSHARP_ACCESS_TOKEN }}" --output "$SCHEMA_JSON_FILE"

    - name: Convert JSON schema to GraphQL
      run: just convert-graphql-schema --input "$SCHEMA_JSON_FILE" --output "$SCHEMA_GRAPHQL_FILE"

    - name: Copy the GraphQL schema to the repo's default schema file
      run: cp "$SCHEMA_JSON_FILE" "$DEFAULT_SCHEMA_FILE"

    - name: Clean output directory
      run: just clean

    - name: Regenerate types from new schema
      run: just regenerate-and-build "$SCHEMA_GRAPHQL_FILE"

    - name: Create pull request
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: just create-graphql-pr --graph-schema-file "$SCHEMA_GRAPHQL_FILE" --json-schema-file "$SCHEMA_JSON_FILE"
